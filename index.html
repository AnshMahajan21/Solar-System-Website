<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolarSystem-ByAnshMahajan21</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            color: white;
            transition: background-color 0.3s ease;
        }

        body.light-mode {
            background: #f0f0f0;
            color: #333;
        }

        canvas {
            display: block;
        }

        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            min-width: 280px;
            max-width: 320px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        body.light-mode .ui-overlay {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.2);
            color: #333;
        }

        .ui-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        body.light-mode .ui-header {
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .ui-header:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        body.light-mode .ui-header:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .ui-title {
            font-weight: bold;
            font-size: 16px;
            margin: 0;
        }

        .dropdown-arrow {
            transition: transform 0.3s ease;
            font-size: 12px;
        }

        .dropdown-arrow.expanded {
            transform: rotate(180deg);
        }

        .ui-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease;
        }

        .ui-content.expanded {
            max-height: 80vh;
            padding: 0 20px 20px 20px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-top: 15px;
        }

        .control-section {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 12px;
            margin-bottom: 8px;
        }

        .control-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        body.light-mode .control-section {
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .section-title {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        body.light-mode .section-title {
            color: #666;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        .control-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        input[type="range"] {
            flex: 1;
            min-width: 120px;
        }

        .planet-controls {
            max-height: 200px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .planet-controls::-webkit-scrollbar {
            width: 6px;
        }

        .planet-controls::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .planet-controls::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
        }

        body.light-mode .planet-controls::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }

        body.light-mode .planet-controls::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.3);
        }

        .planet-speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .planet-speed-control:last-child {
            margin-bottom: 0;
        }

        .planet-name {
            min-width: 55px;
            font-weight: 500;
            text-transform: capitalize;
            font-size: 11px;
        }

        .planet-speed-slider {
            flex: 1;
            min-width: 80px;
        }

        .speed-value {
            min-width: 30px;
            font-size: 10px;
            color: #aaa;
            text-align: right;
        }

        body.light-mode .speed-value {
            color: #666;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
            font-weight: 500;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }

        body.light-mode button {
            background: rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.2);
            color: #333;
        }

        body.light-mode button:hover {
            background: rgba(0, 0, 0, 0.15);
            border-color: rgba(0, 0, 0, 0.3);
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 101;
        }

        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -100%);
            margin-top: -10px;
            opacity: 0;
            transition: opacity 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        body.light-mode .tooltip {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            border: 1px solid rgba(0, 0, 0, 0.3);
        }

        .tooltip.visible {
            opacity: 1;
        }

        .tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: rgba(0, 0, 0, 0.9);
        }

        body.light-mode .tooltip::after {
            border-top-color: rgba(255, 255, 255, 0.95);
        }

        .planet-info {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            min-width: 200px;
            display: none;
            transition: all 0.3s ease;
        }

        body.light-mode .planet-info {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.2);
            color: #333;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="loading">Loading Solar System...</div>
    
    <div class="theme-toggle">
        <button id="themeToggle">🌙 Dark Mode</button>
    </div>
    
    <div class="ui-overlay">
        <div class="ui-header" id="uiHeader">
            <h3 class="ui-title">🪐 Solar System Controls</h3>
            <span class="dropdown-arrow" id="dropdownArrow">▼</span>
        </div>
        <div class="ui-content" id="uiContent">
            <div class="controls">
                <div class="control-section">
                    <div class="section-title">Animation</div>
                    <div class="control-group">
                        <label>Global Speed:</label>
                        <input type="range" id="speedSlider" min="0" max="5" value="1" step="0.1">
                        <span id="speedValue">1x</span>
                    </div>
                    <div class="control-buttons">
                        <button id="pauseBtn">Pause</button>
                        <button id="resetBtn">Reset View</button>
                    </div>
                </div>
                
                <div class="control-section">
                    <div class="section-title">Display</div>
                    <div class="control-buttons">
                        <button id="toggleOrbits">Toggle Orbits</button>
                        <button id="resetSpeeds">Reset Speeds</button>
                    </div>
                </div>
                
                <div class="control-section">
                    <div class="section-title">Individual Planet Speeds</div>
                    <div class="planet-controls" id="planetSpeedControls"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="planet-info" id="planetInfo">
        <h4 id="planetName">Planet Name</h4>
        <p id="planetDescription">Description...</p>
    </div>

    <div class="tooltip" id="tooltip"></div>

    
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
